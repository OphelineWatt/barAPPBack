spring.application.name=barapp-backend
server.port=${PORT:8081}
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:barapp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

# DEV only: let Hibernate create/update schema
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Database initialization script (src/main/resources/data.sql), run once Hibernate
# has created/updated the schema so the seed data targets existing tables.
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT (override JWT_SECRET in production via environment variable)
jwt.secret=${JWT_SECRET:dev-only-barapp-secret-key-change-me-in-production-32bytes}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
